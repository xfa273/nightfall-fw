site_name: Nightfall FW Micromouse Blog
site_description: マイクロマウス関連記事の公開ページ
site_url: https://xfa273.github.io/nightfall-fw/
repo_url: https://github.com/xfa273/nightfall-fw

docs_dir: docs/blog
use_directory_urls: true

theme:
  name: mkdocs
  language: ja

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/github-dark.css

extra_javascript:
  - javascripts/twitter-embed.js

nav:
